<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner IFRS - Laboratório</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        h2 { color: #333; }
        .camera-container {
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin: 0 auto 15px auto;
            max-width: 100%;
            width: 400px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            /* Define uma altura mínima para não ficar um quadrado pequeno se falhar */
            min-height: 250px; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video { 
            width: 100%; 
            display: block; 
            background-color: #000;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }
        button:active { background-color: #218838; }
        button:disabled { background-color: #6c757d; cursor: not-allowed; }
        #status {
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 5px;
            max-width: 370px;
            margin: 0 auto;
            font-size: 16px;
            color: #333;
            min-height: 50px;
            word-wrap: break-word;
        }
        .loading { color: #0056b3; font-weight: bold; }
        .success { color: #28a745; font-weight: bold; }
        .error { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Scanner de Patrimônio</h2>
    
    <div class="camera-container">
        <video id="video" autoplay playsinline muted></video>
    </div>
    
    <button id="btn-capturar">Capturar Etiqueta</button>
    
    <canvas id="canvas" style="display:none;"></canvas>
    
    <div id="status">Iniciando câmera...</div>

    <script>
        // Pega os elementos
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const statusDiv = document.getElementById('status');
        const btnCapturar = document.getElementById('btn-capturar');

        // Verificação extra de segurança para navegadores
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            
            // Tenta forçar a câmera traseira
            const constraints = { video: { facingMode: "environment" } };
            
            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(stream) {
                    video.srcObject = stream;
                    // Comando crucial para forçar o vídeo a rodar no celular
                    video.play(); 
                    statusDiv.innerHTML = "Câmera ativada! Aponte para a etiqueta.";
                })
                .catch(function(err) {
                    console.error("Erro na câmera:", err);
                    statusDiv.innerHTML = "<span class='error'>Erro: Permita o acesso à câmera nas configurações do navegador (ícone de opções perto da URL).</span>";
                    alert("O navegador bloqueou a câmera. Verifique as permissões do site.");
                });
        } else {
            statusDiv.innerHTML = "<span class='error'>Seu navegador não suporta acesso à câmera por este link.</span>";
        }

        // Função de clique no botão
        btnCapturar.addEventListener('click', () => {
            // Verifica se o vídeo realmente está rodando antes de tentar capturar
            if (!video.videoWidth) {
                alert("Aguarde a câmera carregar ou verifique as permissões.");
                return;
            }

            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = canvas.toDataURL('image/png');
            enviarParaGoogle(imageData);
        });

        // Envio para a planilha
        function enviarParaGoogle(base64Image) {
            statusDiv.innerHTML = "<span class='loading'>Enviando imagem e processando OCR...</span>";
            btnCapturar.disabled = true;
            btnCapturar.innerText = "Processando...";

            // Sua URL do Google Apps Script
            const urlApp = "https://script.google.com/macros/s/AKfycbzqohD6y8lVWu3SENbhp-B9UvUjgf-UEeunfxytivk0nAgxP3Lg1HbSR83Vf8q0fCk6/exec";

            fetch(urlApp, {
                method: 'POST',
                body: JSON.stringify({ image: base64Image })
            })
            .then(response => response.text())
            .then(texto => {
                statusDiv.innerHTML = "<span class='success'><strong>Concluído:</strong><br>" + texto + "</span>";
                btnCapturar.disabled = false;
                btnCapturar.innerText = "Capturar Nova Etiqueta";
            })
            .catch(err => {
                statusDiv.innerHTML = "<span class='error'>Erro ao comunicar com o Google Sheets.</span>";
                console.error("Erro no Fetch:", err);
                btnCapturar.disabled = false;
                btnCapturar.innerText = "Tentar Novamente";
            });
        }
    </script>
</body>
</html>
